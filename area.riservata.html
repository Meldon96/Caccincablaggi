<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login Area Riservata | Caccin Cablaggi</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f8fafc; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #006666; color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Area Riservata</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="checkLogin()">Accedi</button>
        <p id="error" style="color:red; font-size: 12px;"></p>
    </div>
    <script>
        function checkLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Dati dei clienti corretti
            const utenti = {
                "rossi": {
                    pass: "Rossi1!",
                    url: "https://drive.google.com/drive/folders/1GHakgB2CaQ7sZSHJsNrSKBCE-N_fjUtf" 
                }
            };

            if (utenti[user] && utenti[user].pass === pass) {
                window.location.href = utenti[user].url;
            } else {
                document.getElementById('error').innerText = "Credenziali errate";
            }
        }
    </script>

</body>
</html>
